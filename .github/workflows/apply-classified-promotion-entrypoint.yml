name: Apply classified promotion entrypoint

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/v0.5.0-storage-classifier-consolidation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-storage-classifier-consolidation
      - name: Patch v0.5 maintenance entrypoint
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/relay/src/main_v0_5.rs')
          text = path.read_text()
          text = text.replace(
              '    build_runtime_storage_backend, ingest_publish_request, publish_ingestion_result_json,\n    runtime_state_dir, QuarantineStore, StorageBackend,\n',
              '    build_runtime_storage_backend, ingest_publish_request, promote_quarantine_record_classified,\n    publish_ingestion_result_json, runtime_state_dir, QuarantinePromotionOutcome, QuarantineStore,\n    StorageBackend,\n',
              1,
          )
          text = text.replace(
              '        Some("publish") => handle_publish(&args),\n',
              '        Some("publish") => handle_publish(&args),\n        Some("quarantine-promote") => handle_quarantine_promote(&args),\n',
              1,
          )
          marker = 'fn handle_serve_http(addr: &str) -> Result<(), String> {'
          insert = '''fn handle_quarantine_promote(args: &[String]) -> Result<(), String> {
    let quarantine_id = args
        .get(1)
        .ok_or_else(|| "usage: lingonberry quarantine-promote <quarantine-id>".to_string())?;
    let backend = build_runtime_storage_backend();
    let outcome = promote_quarantine_record_classified(quarantine_id, &backend)
        .map_err(|error| error.to_string())?;
    println!("{}", to_canonical_json(&promotion_outcome_json(outcome)));
    Ok(())
}

fn promotion_outcome_json(outcome: QuarantinePromotionOutcome) -> JsonValue {
    match outcome {
        QuarantinePromotionOutcome::Promoted {
            quarantine_id,
            canonical_id,
            duplicate,
        } => json_object(vec![
            ("status", JsonValue::String("promoted".to_string())),
            ("quarantineId", JsonValue::String(quarantine_id)),
            ("canonicalId", JsonValue::String(canonical_id)),
            ("duplicate", JsonValue::Bool(duplicate)),
        ]),
        QuarantinePromotionOutcome::AlreadyPromoted {
            quarantine_id,
            canonical_id,
            duplicate,
        } => json_object(vec![
            ("status", JsonValue::String("already-promoted".to_string())),
            ("quarantineId", JsonValue::String(quarantine_id)),
            ("canonicalId", JsonValue::String(canonical_id)),
            ("duplicate", JsonValue::Bool(duplicate)),
        ]),
        QuarantinePromotionOutcome::StillDeferred {
            quarantine_id,
            code,
            errors,
        } => json_object(vec![
            ("status", JsonValue::String("deferred".to_string())),
            ("quarantineId", JsonValue::String(quarantine_id)),
            ("code", JsonValue::String(code.to_string())),
            (
                "errors",
                JsonValue::Array(errors.into_iter().map(JsonValue::String).collect()),
            ),
        ]),
        QuarantinePromotionOutcome::Rejected {
            quarantine_id,
            code,
            errors,
        } => json_object(vec![
            ("status", JsonValue::String("rejected".to_string())),
            ("quarantineId", JsonValue::String(quarantine_id)),
            ("code", JsonValue::String(code.to_string())),
            (
                "errors",
                JsonValue::Array(errors.into_iter().map(JsonValue::String).collect()),
            ),
        ]),
    }
}

'''
          if marker not in text:
              raise SystemExit('serve-http marker missing')
          text = text.replace(marker, insert + marker, 1)
          path.write_text(text)
          PY
          cargo fmt --all
          rm .github/workflows/apply-classified-promotion-entrypoint.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/relay/src/main_v0_5.rs .github/workflows/apply-classified-promotion-entrypoint.yml
          git commit -m 'refactor: route quarantine promotion through classifier'
          git push origin HEAD:agent/v0.5.0-storage-classifier-consolidation
