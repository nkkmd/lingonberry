name: Apply Phase 2 classifier migration

on:
  pull_request:
    types: [synchronize]
  push:
    branches:
      - agent/v0.5.0-lifecycle-foundation

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.head_commit.message != 'Apply shared duplicate conflict classifier'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-lifecycle-foundation
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Patch backends
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('packages/core/src/lib_entry.rs')
          text = lib.read_text()
          text = text.replace(
              'use lingonberry_protocol::{\n',
              'use crate::{\n    classify_duplicate_or_conflict, DuplicateConflictClassification, ExistingObjectIdentity,\n    IncomingObjectIdentity, DUPLICATE_CONFLICT_CONTRACT_VERSION,\n};\nuse lingonberry_protocol::{\n',
              1,
          )
          old = '''    if let Some(existing) = get_record_by_carrier_identity(paths, &carrier_identity)? {
        let existing_json = to_canonical_json(&existing.object);
        if existing_json != finalized.canonical_json {
            return Err(StoreError {
                code: "LB_OBJECT_CONFLICT",
                message: format!(
                    "carrier identity already exists with different content: {}",
                    carrier_identity
                ),
            });
        }
        return Ok(AppendOutcome {
            stored_at: Some(existing.stored_at),
            canonical_id: existing.canonical_id,
            carrier_identity,
            object: existing.object,
            duplicate: true,
        });
    }

    if let Some(existing) = get_record(paths, &finalized.canonical_id)? {
        let existing_json = to_canonical_json(&existing.object);
        if existing_json != finalized.canonical_json {
            return Err(StoreError {
                code: "LB_OBJECT_CONFLICT",
                message: format!(
                    "object already exists with different content: {}",
                    finalized.canonical_id
                ),
            });
        }
        return Ok(AppendOutcome {
            stored_at: Some(existing.stored_at),
            canonical_id: finalized.canonical_id.clone(),
            carrier_identity,
            object: existing.object,
            duplicate: true,
        });
    }
'''
          new = '''    let existing_by_carrier_identity =
        get_record_by_carrier_identity(paths, &carrier_identity)?;
    let existing_by_canonical_id = get_record(paths, &finalized.canonical_id)?;
    let classification = classify_duplicate_or_conflict(
        existing_by_canonical_id
            .as_ref()
            .map(|existing| ExistingObjectIdentity {
                canonical_id: &existing.canonical_id,
                carrier_identity: &existing.carrier_identity,
                object: &existing.object,
            }),
        existing_by_carrier_identity
            .as_ref()
            .map(|existing| ExistingObjectIdentity {
                canonical_id: &existing.canonical_id,
                carrier_identity: &existing.carrier_identity,
                object: &existing.object,
            }),
        IncomingObjectIdentity {
            canonical_id: &finalized.canonical_id,
            carrier_identity: &carrier_identity,
            canonical_json: &finalized.canonical_json,
        },
    );
    match classification {
        DuplicateConflictClassification::New => {}
        DuplicateConflictClassification::ExactDuplicate => {
            let existing = existing_by_carrier_identity
                .or(existing_by_canonical_id)
                .ok_or_else(|| store_error("LB_OBJECT_CONFLICT", "duplicate classification missing existing record"))?;
            return Ok(AppendOutcome {
                stored_at: Some(existing.stored_at),
                canonical_id: existing.canonical_id,
                carrier_identity: existing.carrier_identity,
                object: existing.object,
                duplicate: true,
            });
        }
        conflict => {
            return Err(StoreError {
                code: conflict.code(),
                message: format!(
                    "duplicate/conflict contract {} classified write as {:?}",
                    DUPLICATE_CONFLICT_CONTRACT_VERSION, conflict
                ),
            });
        }
    }
'''
          if old not in text:
              raise SystemExit('file backend classification block not found')
          lib.write_text(text.replace(old, new, 1))

          sqlite = Path('packages/core/src/sqlite.rs')
          text = sqlite.read_text()
          text = text.replace(
              'use crate::{\n    append_line, as_object, as_string, carrier_identity_for_request, ensure_parent,\n',
              'use crate::{\n    append_line, as_object, as_string, carrier_identity_for_request,\n    classify_duplicate_or_conflict, ensure_parent,\n',
              1,
          )
          text = text.replace(
              '    StoredCatalogRecord, StoredReplayRecord,\n};',
              '    StoredCatalogRecord, StoredReplayRecord, DuplicateConflictClassification,\n    ExistingObjectIdentity, IncomingObjectIdentity, DUPLICATE_CONFLICT_CONTRACT_VERSION,\n};',
              1,
          )
          old = '''        if let Some(existing) = db.get_object_by_carrier_identity(&carrier_identity)? {
            let existing_json = to_canonical_json(&existing.object);
            if existing_json != finalized.canonical_json {
                return Err(StoreError {
                    code: "LB_OBJECT_CONFLICT",
                    message: format!(
                        "carrier identity already exists with different content: {}",
                        existing.carrier_identity
                    ),
                });
            }
            return Ok(AppendOutcome {
                stored_at: Some(existing.stored_at),
                canonical_id: existing.canonical_id,
                carrier_identity: existing.carrier_identity,
                object: existing.object,
                duplicate: true,
            });
        }
        if let Some(existing) = db.get_object(&finalized.canonical_id)? {
            let existing_json = to_canonical_json(&existing.object);
            if existing_json != finalized.canonical_json {
                return Err(StoreError {
                    code: "LB_OBJECT_CONFLICT",
                    message: format!(
                        "object already exists with different content: {}",
                        finalized.canonical_id
                    ),
                });
            }
            return Ok(AppendOutcome {
                stored_at: Some(existing.stored_at),
                canonical_id: finalized.canonical_id.clone(),
                carrier_identity: carrier_identity.clone(),
                object: existing.object,
                duplicate: true,
            });
        }
'''
          new = '''        let existing_by_carrier_identity =
            db.get_object_by_carrier_identity(&carrier_identity)?;
        let existing_by_canonical_id = db.get_object(&finalized.canonical_id)?;
        let classification = classify_duplicate_or_conflict(
            existing_by_canonical_id
                .as_ref()
                .map(|existing| ExistingObjectIdentity {
                    canonical_id: &existing.canonical_id,
                    carrier_identity: &existing.carrier_identity,
                    object: &existing.object,
                }),
            existing_by_carrier_identity
                .as_ref()
                .map(|existing| ExistingObjectIdentity {
                    canonical_id: &existing.canonical_id,
                    carrier_identity: &existing.carrier_identity,
                    object: &existing.object,
                }),
            IncomingObjectIdentity {
                canonical_id: &finalized.canonical_id,
                carrier_identity: &carrier_identity,
                canonical_json: &finalized.canonical_json,
            },
        );
        match classification {
            DuplicateConflictClassification::New => {}
            DuplicateConflictClassification::ExactDuplicate => {
                let existing = existing_by_carrier_identity
                    .or(existing_by_canonical_id)
                    .ok_or_else(|| store_error("LB_OBJECT_CONFLICT", "duplicate classification missing existing record"))?;
                return Ok(AppendOutcome {
                    stored_at: Some(existing.stored_at),
                    canonical_id: existing.canonical_id,
                    carrier_identity: existing.carrier_identity,
                    object: existing.object,
                    duplicate: true,
                });
            }
            conflict => {
                return Err(StoreError {
                    code: conflict.code(),
                    message: format!(
                        "duplicate/conflict contract {} classified write as {:?}",
                        DUPLICATE_CONFLICT_CONTRACT_VERSION, conflict
                    ),
                });
            }
        }
'''
          if old not in text:
              raise SystemExit('sqlite classification block not found')
          sqlite.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          rm .github/workflows/apply-phase2-classifier.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src/lib_entry.rs packages/core/src/sqlite.rs .github/workflows/apply-phase2-classifier.yml
          git commit -m 'Apply shared duplicate conflict classifier'
          git push origin HEAD:agent/v0.5.0-lifecycle-foundation
