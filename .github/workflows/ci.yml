name: Diagnose test clippy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables > /tmp/test-clippy.log 2>&1
          status=$?
          echo "status=$status" >> /tmp/test-clippy.log
          cat /tmp/test-clippy.log
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: test-clippy-diagnostics
          path: /tmp/test-clippy.log
          if-no-files-found: error
