name: Fix generation-aware status test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fix test and commit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/core/src/quarantine_status.rs')
          text = path.read_text()
          old = 'fs::write(store.permanent_rejections_path(), "not-json\\n").unwrap();'
          new = 'fs::write(store.permanent_rejections_path().unwrap(), "not-json\\n").unwrap();'
          if old not in text:
              raise SystemExit('expected status test line not found')
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src/quarantine_status.rs
          git commit -m "test: resolve generation-aware rejection path"
          git push origin HEAD:${{ github.head_ref }}
