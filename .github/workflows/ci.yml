name: Export partial completion bundle

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: completion-export-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Decode available bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/lingonberry-completion.part* | base64 --decode > /tmp/completion-partial.tgz

      - name: Upload partial bundle
        uses: actions/upload-artifact@v4
        with:
          name: completion-partial
          path: /tmp/completion-partial.tgz
          if-no-files-found: error
