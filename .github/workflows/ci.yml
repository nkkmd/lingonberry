name: Prepare v0.3.0 workspace version

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update workspace package versions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changed = []
          for path in sorted(Path('packages').glob('*/Cargo.toml')):
              text = path.read_text()
              updated = text.replace('version = "0.2.0"', 'version = "0.3.0"')
              if updated != text:
                  path.write_text(updated)
                  changed.append(str(path))
          if not changed:
              raise SystemExit('no workspace package versions required updating')
          print('\n'.join(changed))
          PY
          cargo check --workspace
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/*/Cargo.toml Cargo.lock
          git commit -m "chore: prepare workspace version 0.3.0"
          git push origin HEAD:${{ github.head_ref }}
