name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Finalize release documentation
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('Publication of the `v0.6.0` tag and GitHub Release follows merge of PR #98 and successful main-branch CI.', 'Publication of the `v0.6.0` tag and GitHub Release follows successful main-branch CI.')
          text = text.replace('cargo fmt --all\n', 'cargo fmt --all -- --check\n')
          readme.write_text(text)

          checklist = Path('docs/roadmap/RELEASE_0_6_0_CHECKLIST.md')
          text = checklist.read_text()
          text = text.replace('- [x] Rust source formatted in CI with `cargo fmt --all`', '- [x] Rust source formatting verified with `cargo fmt --all -- --check`')
          text = text.replace('- [ ] Merge authorization confirmed', '- [x] Merge authorization confirmed')
          checklist.write_text(text)
          PY
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md docs/roadmap/RELEASE_0_6_0_CHECKLIST.md
            git commit -m "docs(v0.6): finalize release gate references"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Check source formatting
        run: cargo fmt --all -- --check
      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings
      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code
      - name: Compile test targets with clippy
        run: cargo clippy --workspace --tests -- -A warnings
      - name: Run workspace tests
        run: cargo test --workspace
  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run JavaScript tests
        run: node --test conformance/manifest-integrity.test.mjs conformance/minimal-producer.test.mjs conformance/transition-evidence-generation.test.mjs conformance/diagnostic-retention-hybrid.test.mjs conformance/diagnostic-cursor-lease.test.mjs conformance/diagnostic-read-guard.test.mjs conformance/diagnostic-read-guard-heartbeat.test.mjs packages/codecs/test/canonicalization.test.mjs packages/identity/test/identity-claim-validator.test.mjs packages/validation/test/validation.test.mjs tests/quarantine-replacement-crash-points.test.mjs
      - name: Run external conformance suite
        run: node conformance/run.mjs
