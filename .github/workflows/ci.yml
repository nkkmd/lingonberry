name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-retrieval-process-test:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0.5.0-object-retrieval-contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add real-binary retrieval process contract
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('packages/relay/tests/publish_process_contract.rs')
          text = path.read_text()

          test = r'''

          #[test]
          fn http_get_contract_covers_found_and_not_found() {
              let workspace = workspace_root();
              let state_dir = unique_temp_dir("http-get");
              fs::create_dir_all(&state_dir).expect("create HTTP GET state directory");
              let minimal = fs::read_to_string(
                  workspace.join("fixtures/http-publish-request/minimal-request.json"),
              )
              .expect("read minimal fixture");

              let port = available_port();
              let mut server = spawn_http_server(&state_dir, port, false);
              wait_until_ready(port);

              let publish_response = http_request(
                  port,
                  "POST /v1/objects",
                  Some(&minimal),
              );
              assert!(publish_response.starts_with("HTTP/1.1 201 "), "{publish_response}");
              let publish_body = publish_response
                  .split_once("\r\n\r\n")
                  .map(|(_, body)| body)
                  .expect("publish response body");
              let publish_json = parse_json(publish_body).expect("parse publish response");
              let JsonValue::Object(publish_map) = publish_json else {
                  panic!("publish response must be an object");
              };
              let canonical_id = match publish_map.get("canonicalId") {
                  Some(JsonValue::String(value)) => value.clone(),
                  other => panic!("missing canonicalId: {other:?}"),
              };

              let found = http_request(
                  port,
                  &format!("GET /v1/objects/{canonical_id}"),
                  None,
              );
              assert!(found.starts_with("HTTP/1.1 200 "), "{found}");
              assert!(found.contains("\"contractVersion\":\"1\""), "{found}");
              assert!(found.contains("\"status\":\"found\""), "{found}");
              assert!(found.contains("\"code\":\"LB_OBJECT_FOUND\""), "{found}");
              assert!(found.contains(&format!("\"canonicalId\":\"{canonical_id}\"")), "{found}");

              let missing = http_request(port, "GET /v1/objects/lb_missing", None);
              assert!(missing.starts_with("HTTP/1.1 404 "), "{missing}");
              assert!(missing.contains("\"contractVersion\":\"1\""), "{missing}");
              assert!(missing.contains("\"status\":\"not-found\""), "{missing}");
              assert!(missing.contains("\"code\":\"LB_OBJECT_NOT_FOUND\""), "{missing}");

              server.kill().ok();
              server.wait().ok();
              fs::remove_dir_all(state_dir).ok();
          }
          '''

          marker = '\nfn signed_unsupported_request('
          if 'fn http_get_contract_covers_found_and_not_found()' not in text:
              if marker not in text:
                  raise SystemExit('test insertion marker not found')
              text = text.replace(marker, test + marker, 1)

          helper = r'''

          fn http_request(port: u16, request_target: &str, body: Option<&str>) -> String {
              let mut stream = TcpStream::connect(("127.0.0.1", port)).expect("connect to HTTP server");
              let body = body.unwrap_or("");
              let request = format!(
                  "{request_target} HTTP/1.1\r\nHost: 127.0.0.1\r\nContent-Type: application/json\r\nContent-Length: {}\r\nConnection: close\r\n\r\n{}",
                  body.len(),
                  body
              );
              stream.write_all(request.as_bytes()).expect("write HTTP request");
              let mut response = String::new();
              stream.read_to_string(&mut response).expect("read HTTP response");
              response
          }
          '''

          marker = '\nfn assert_http_contract('
          if 'fn http_request(port: u16' not in text:
              if marker not in text:
                  raise SystemExit('helper insertion marker not found')
              text = text.replace(marker, helper + marker, 1)

          path.write_text(text)
          PY
          cargo fmt --all
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/relay/tests/publish_process_contract.rs .github/workflows/ci.yml
          git commit -m "test: cover object retrieval process contract"
          git push origin "HEAD:${TARGET_BRANCH}"

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
