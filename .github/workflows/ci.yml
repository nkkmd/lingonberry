name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/v0.4.0-cleanup-transaction

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Fix managed-path cleanup references
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/core/src/quarantine_replacement_cleanup_transaction_journal.rs')
          text = path.read_text()
          text = text.replace(
              '''    if journal
                  .deleted_subjects
                  .iter()
                  .any(|value| value == generation_id)
              {''',
              '''    if journal
                  .deleted_paths
                  .iter()
                  .any(|value| value == managed_path)
              {''',
          )
          text = text.replace('unique.len() != journal.deleted_subjects.len()', 'unique.len() != journal.deleted_paths.len()')
          text = text.replace('.deleted_subjects\n            .windows(2)', '.deleted_paths\n            .windows(2)')
          path.write_text(text)
          PY
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/quarantine_replacement_cleanup_transaction_journal.rs
          git commit -m "fix: remove stale subject progress references"
          git push origin HEAD:feat/v0.4.0-cleanup-transaction

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
