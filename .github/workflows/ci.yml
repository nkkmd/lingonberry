name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-backend-classifier:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/v0.5.0-backend-classifier-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-backend-classifier-cleanup
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply shared classifier to storage backends
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('packages/core/src/lib.rs')
          text = lib.read_text()
          start = text.index('pub fn append_publish_request(\n')
          end = text.index('pub fn get_record(\n', start)
          replacement = '''pub fn append_publish_request(
              paths: &StorePaths,
              request_json: &str,
              finalized: &FinalizedKnowledgeObject,
          ) -> Result<AppendOutcome, StoreError> {
              let carrier_identity = carrier_identity_for_request(request_json)?;
              ensure_parent(&paths.raw_log_path)?;
              ensure_parent(&paths.catalog_path)?;

              let existing_by_carrier_identity =
                  get_record_by_carrier_identity(paths, &carrier_identity)?;
              let existing_by_canonical_id = get_record(paths, &finalized.canonical_id)?;
              let classification = crate::classify_duplicate_or_conflict(
                  existing_by_canonical_id
                      .as_ref()
                      .map(|existing| crate::ExistingObjectIdentity {
                          canonical_id: &existing.canonical_id,
                          carrier_identity: &existing.carrier_identity,
                          object: &existing.object,
                      }),
                  existing_by_carrier_identity
                      .as_ref()
                      .map(|existing| crate::ExistingObjectIdentity {
                          canonical_id: &existing.canonical_id,
                          carrier_identity: &existing.carrier_identity,
                          object: &existing.object,
                      }),
                  crate::IncomingObjectIdentity {
                      canonical_id: &finalized.canonical_id,
                      carrier_identity: &carrier_identity,
                      canonical_json: &finalized.canonical_json,
                  },
              );

              match classification {
                  crate::DuplicateConflictClassification::New => {}
                  crate::DuplicateConflictClassification::ExactDuplicate => {
                      let existing = existing_by_carrier_identity
                          .or(existing_by_canonical_id)
                          .ok_or_else(|| {
                              store_error(
                                  "LB_OBJECT_CONFLICT",
                                  "duplicate classification missing existing record",
                              )
                          })?;
                      return Ok(AppendOutcome {
                          stored_at: Some(existing.stored_at),
                          canonical_id: existing.canonical_id,
                          carrier_identity: existing.carrier_identity,
                          object: existing.object,
                          duplicate: true,
                      });
                  }
                  conflict => {
                      return Err(store_error(
                          conflict.code(),
                          format!(
                              "duplicate/conflict contract {} classified write as {:?}",
                              crate::DUPLICATE_CONFLICT_CONTRACT_VERSION,
                              conflict
                          ),
                      ));
                  }
              }

              let stored_at = now_utc_rfc3339();
              let raw_record = json_object(vec![
                  ("storedAt", JsonValue::String(stored_at.clone())),
                  (
                      "canonicalId",
                      JsonValue::String(finalized.canonical_id.clone()),
                  ),
                  (
                      "carrierIdentity",
                      JsonValue::String(carrier_identity.clone()),
                  ),
                  ("requestJson", JsonValue::String(request_json.to_string())),
              ]);
              let catalog_record = json_object(vec![
                  ("storedAt", JsonValue::String(stored_at.clone())),
                  (
                      "canonicalId",
                      JsonValue::String(finalized.canonical_id.clone()),
                  ),
                  (
                      "carrierIdentity",
                      JsonValue::String(carrier_identity.clone()),
                  ),
                  ("object", finalized.object.clone()),
              ]);

              append_line(&paths.raw_log_path, &to_canonical_json(&raw_record))?;
              append_line(&paths.catalog_path, &to_canonical_json(&catalog_record))?;

              Ok(AppendOutcome {
                  stored_at: Some(stored_at),
                  canonical_id: finalized.canonical_id.clone(),
                  carrier_identity,
                  object: finalized.object.clone(),
                  duplicate: false,
              })
          }

          '''
          lib.write_text(text[:start] + replacement + text[end:])

          sqlite = Path('packages/core/src/sqlite.rs')
          text = sqlite.read_text()
          start = text.index('    fn append_publish_request(\n')
          end = text.index('    fn get(&self, canonical_id:', start)
          replacement = '''    fn append_publish_request(
              &self,
              request_json: &str,
              finalized: &FinalizedKnowledgeObject,
          ) -> Result<AppendOutcome, StoreError> {
              ensure_parent(&self.paths.raw_log_path)?;
              let carrier_identity = carrier_identity_for_request(request_json)?;
              let db = self.open_db()?;
              let existing_by_carrier_identity =
                  db.get_object_by_carrier_identity(&carrier_identity)?;
              let existing_by_canonical_id = db.get_object(&finalized.canonical_id)?;
              let classification = crate::classify_duplicate_or_conflict(
                  existing_by_canonical_id
                      .as_ref()
                      .map(|existing| crate::ExistingObjectIdentity {
                          canonical_id: &existing.canonical_id,
                          carrier_identity: &existing.carrier_identity,
                          object: &existing.object,
                      }),
                  existing_by_carrier_identity
                      .as_ref()
                      .map(|existing| crate::ExistingObjectIdentity {
                          canonical_id: &existing.canonical_id,
                          carrier_identity: &existing.carrier_identity,
                          object: &existing.object,
                      }),
                  crate::IncomingObjectIdentity {
                      canonical_id: &finalized.canonical_id,
                      carrier_identity: &carrier_identity,
                      canonical_json: &finalized.canonical_json,
                  },
              );

              match classification {
                  crate::DuplicateConflictClassification::New => {}
                  crate::DuplicateConflictClassification::ExactDuplicate => {
                      let existing = existing_by_carrier_identity
                          .or(existing_by_canonical_id)
                          .ok_or_else(|| {
                              store_error(
                                  "LB_OBJECT_CONFLICT",
                                  "duplicate classification missing existing record",
                              )
                          })?;
                      return Ok(AppendOutcome {
                          stored_at: Some(existing.stored_at),
                          canonical_id: existing.canonical_id,
                          carrier_identity: existing.carrier_identity,
                          object: existing.object,
                          duplicate: true,
                      });
                  }
                  conflict => {
                      return Err(store_error(
                          conflict.code(),
                          format!(
                              "duplicate/conflict contract {} classified write as {:?}",
                              crate::DUPLICATE_CONFLICT_CONTRACT_VERSION,
                              conflict
                          ),
                      ));
                  }
              }

              let stored_at = now_utc_rfc3339();
              append_line(
                  &self.paths.raw_log_path,
                  &to_canonical_json(&json_object(vec![
                      ("storedAt", JsonValue::String(stored_at.clone())),
                      (
                          "canonicalId",
                          JsonValue::String(finalized.canonical_id.clone()),
                      ),
                      (
                          "carrierIdentity",
                          JsonValue::String(carrier_identity.clone()),
                      ),
                      ("requestJson", JsonValue::String(request_json.to_string())),
                  ])),
              )?;
              db.insert_object(
                  &finalized.canonical_id,
                  &carrier_identity,
                  &stored_at,
                  &finalized.object,
              )?;
              Ok(AppendOutcome {
                  stored_at: Some(stored_at),
                  canonical_id: finalized.canonical_id.clone(),
                  carrier_identity,
                  object: finalized.object.clone(),
                  duplicate: false,
              })
          }

          '''
          sqlite.write_text(text[:start] + replacement + text[end:])
          PY
          cargo fmt --all
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src/lib.rs packages/core/src/sqlite.rs .github/workflows/ci.yml
          git commit -m 'refactor: use shared classifier in storage backends'
          git push origin HEAD:agent/v0.5.0-backend-classifier-cleanup

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
