name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/v0.4.0-cleanup-transaction

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rebuild cleanup exports deterministically
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/core/src/lib_entry.rs')
          lines = path.read_text().splitlines()

          deduped = []
          seen_tomb_module = False
          seen_execution_module = False
          for line in lines:
              if line == 'mod quarantine_replacement_cleanup_tomb;':
                  if seen_tomb_module:
                      continue
                  seen_tomb_module = True
              if line == 'mod quarantine_replacement_cleanup_execution;':
                  if seen_execution_module:
                      continue
                  seen_execution_module = True
              deduped.append(line)
          if not seen_execution_module:
              index = deduped.index('mod quarantine_replacement_cleanup_tomb;') + 1
              deduped.insert(index, 'mod quarantine_replacement_cleanup_execution;')

          cleaned = []
          index = 0
          while index < len(deduped):
              line = deduped[index]
              if line in {
                  'pub use quarantine_replacement_cleanup_tomb::{',
                  'pub use quarantine_replacement_cleanup_execution::{',
              }:
                  index += 1
                  while index < len(deduped) and deduped[index] != '};':
                      index += 1
                  index += 1
                  continue
              cleaned.append(line)
              index += 1

          insert_at = cleaned.index('pub use quarantine_replacement_cleanup_transaction::{')
          exports = '''pub use quarantine_replacement_cleanup_tomb::{
              move_quarantine_replacement_cleanup_to_tomb, resume_quarantine_replacement_cleanup_deletion,
              rollback_quarantine_replacement_cleanup_tomb, QuarantineReplacementCleanupTombReport,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_DIR,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_DIGEST_FILE,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_FILE,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_VERSION,
          };
          pub use quarantine_replacement_cleanup_execution::{
              commit_verified_quarantine_replacement_cleanup_deletion,
              prepare_verified_quarantine_replacement_cleanup_tomb,
              rollback_verified_quarantine_replacement_cleanup,
              QuarantineReplacementCleanupAuthorization,
          };'''.splitlines()
          cleaned[insert_at:insert_at] = exports
          path.write_text('\n'.join(cleaned) + '\n')
          PY
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/lib_entry.rs packages/core/src/quarantine_replacement_cleanup_execution.rs
          git commit -m "feat: expose double opt-in cleanup execution"
          git push origin HEAD:feat/v0.4.0-cleanup-transaction

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs