name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format working tree during implementation
        run: cargo fmt --all

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy and capture output
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables 2>&1 | tee clippy-tests.log

      - name: Upload test clippy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-tests-log
          path: clippy-tests.log

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          conformance/manifest-integrity.test.mjs
          conformance/minimal-producer.test.mjs
          conformance/transition-evidence-generation.test.mjs
          conformance/diagnostic-retention-hybrid.test.mjs
          conformance/diagnostic-cursor-lease.test.mjs
          conformance/diagnostic-read-guard.test.mjs
          conformance/diagnostic-read-guard-heartbeat.test.mjs
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs

      - name: Run external conformance suite
        run: node conformance/run.mjs
