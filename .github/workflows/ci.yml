name: Diagnose replacement failure-injection tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Capture transaction test diagnostics
        shell: bash
        run: |
          set +e
          cargo test -p lingonberry-core --test quarantine_replacement_transaction -- --nocapture > transaction-tests.txt 2>&1
          status=$?
          cat transaction-tests.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replacement-failure-injection-tests
          path: transaction-tests.txt
