name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Verify terminal evidence on resume
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('packages/core/src/quarantine_replacement_publication.inc')
          text = path.read_text()
          pattern = re.compile(
              r'''            QuarantineReplacementTransactionState::Committed\s*\n'''
              r'''            \| QuarantineReplacementTransactionState::RolledBack => \{\s*\n'''
              r'''                return quarantine_replacement_status\(state_dir, transaction_dir\);\s*\n'''
              r'''            \}'''
          )
          replacement = '''            QuarantineReplacementTransactionState::Committed => {
                  let generation_digest = verify_quarantine_replacement_generation(transaction_dir)?
                      .generation_digest;
                  crate::quarantine_replacement_completion_evidence_terminal::finalize_quarantine_replacement_completion_evidence(
                      transaction_dir,
                      Some(&generation_digest),
                  )?;
                  return quarantine_replacement_status(state_dir, transaction_dir);
              }
              QuarantineReplacementTransactionState::RolledBack => {
                  let generation_digest = if publication_intent_path(transaction_dir).exists() {
                      Some(read_intent(transaction_dir)?.generation_digest)
                  } else {
                      None
                  };
                  crate::quarantine_replacement_completion_evidence_terminal::finalize_quarantine_replacement_completion_evidence(
                      transaction_dir,
                      generation_digest.as_deref(),
                  )?;
                  return quarantine_replacement_status(state_dir, transaction_dir);
              }'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'terminal resume branch matches: {count}')
          path.write_text(text)
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src/quarantine_replacement_publication.inc
          git commit -m "fix: verify terminal completion evidence on resume"
          git push origin HEAD:${{ github.head_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
