name: Wire early replacement failure points

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Wire failure points and tests
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          failure = Path('packages/core/src/quarantine_replacement_failure_injection.rs')
          text = failure.read_text()
          marker = 'pub const FAILURE_POINT_ROLLED_BACK_TRANSITION: &str = "rollback.rolled-back-transition";\n'
          addition = marker + '''pub const FAILURE_POINT_JOURNAL_RENAME: &str = "transaction.journal-rename";
pub const FAILURE_POINT_STAGED_LEDGER_WRITE: &str = "staging.ledger-write";
pub const FAILURE_POINT_MATERIALIZED_GENERATION_RENAME: &str =
    "publication.materialized-generation-rename";
'''
          if 'FAILURE_POINT_JOURNAL_RENAME' not in text:
              if marker not in text:
                  raise SystemExit('failure constant marker missing')
              text = text.replace(marker, addition, 1)
              failure.write_text(text)

          transaction = Path('packages/core/src/quarantine_replacement_transaction.rs')
          text = transaction.read_text()
          paths_marker = '''    let journal_path = transaction_dir.join(QUARANTINE_REPLACEMENT_TRANSACTION_JOURNAL_FILE);
    let digest_path = transaction_dir.join(QUARANTINE_REPLACEMENT_TRANSACTION_JOURNAL_DIGEST_FILE);

    write_new_synced(&journal_tmp, text.as_bytes())?;
'''
          paths_replacement = '''    let journal_path = transaction_dir.join(QUARANTINE_REPLACEMENT_TRANSACTION_JOURNAL_FILE);
    let digest_path = transaction_dir.join(QUARANTINE_REPLACEMENT_TRANSACTION_JOURNAL_DIGEST_FILE);

    for temporary in [&journal_tmp, &digest_tmp] {
        if temporary.exists() {
            fs::remove_file(temporary).map_err(io_error)?;
        }
    }
    write_new_synced(&journal_tmp, text.as_bytes())?;
'''
          if 'for temporary in [&journal_tmp, &digest_tmp]' not in text:
              if paths_marker not in text:
                  raise SystemExit('journal temporary cleanup marker missing')
              text = text.replace(paths_marker, paths_replacement, 1)
          inject_marker = '''    write_new_synced(&journal_tmp, text.as_bytes())?;
    write_new_synced(&digest_tmp, format!("{digest}\\n").as_bytes())?;
    fs::rename(&journal_tmp, &journal_path).map_err(io_error)?;
'''
          inject_replacement = '''    write_new_synced(&journal_tmp, text.as_bytes())?;
    write_new_synced(&digest_tmp, format!("{digest}\\n").as_bytes())?;
    if journal.sequence > 0 {
        crate::quarantine_replacement_failure_injection::inject_quarantine_replacement_failure(
            crate::quarantine_replacement_failure_injection::FAILURE_POINT_JOURNAL_RENAME,
        )?;
    }
    fs::rename(&journal_tmp, &journal_path).map_err(io_error)?;
'''
          if 'FAILURE_POINT_JOURNAL_RENAME' not in text:
              if inject_marker not in text:
                  raise SystemExit('journal injection marker missing')
              text = text.replace(inject_marker, inject_replacement, 1)
          transaction.write_text(text)

          staging = Path('packages/core/src/quarantine_replacement_staging.inc')
          text = staging.read_text()
          marker = '''    let target = staging_dir.join(ledger);
    write_new_synced(&target, &output)?;
'''
          replacement = '''    let target = staging_dir.join(ledger);
    crate::quarantine_replacement_failure_injection::inject_quarantine_replacement_failure(
        crate::quarantine_replacement_failure_injection::FAILURE_POINT_STAGED_LEDGER_WRITE,
    )?;
    write_new_synced(&target, &output)?;
'''
          if 'FAILURE_POINT_STAGED_LEDGER_WRITE' not in text:
              if marker not in text:
                  raise SystemExit('staging injection marker missing')
              text = text.replace(marker, replacement, 1)
              staging.write_text(text)

          publication = Path('packages/core/src/quarantine_replacement_publication.inc')
          text = publication.read_text()
          marker = '''    sync_directory(&temporary_dir)?;
    fs::rename(&temporary_dir, &final_dir).map_err(io_error)?;
'''
          replacement = '''    sync_directory(&temporary_dir)?;
    crate::quarantine_replacement_failure_injection::inject_quarantine_replacement_failure(
        crate::quarantine_replacement_failure_injection::FAILURE_POINT_MATERIALIZED_GENERATION_RENAME,
    )?;
    fs::rename(&temporary_dir, &final_dir).map_err(io_error)?;
'''
          if 'FAILURE_POINT_MATERIALIZED_GENERATION_RENAME' not in text:
              if marker not in text:
                  raise SystemExit('materialization injection marker missing')
              text = text.replace(marker, replacement, 1)
              publication.write_text(text)

          test = Path('packages/core/tests/quarantine_replacement_early_failure_matrix.rs')
          test.write_text(r'''use std::fs;
use std::path::PathBuf;
use std::sync::Mutex;
use std::time::{SystemTime, UNIX_EPOCH};

use lingonberry_core::{
    apply_quarantine_replacement_transaction, create_quarantine_replacement_preview,
    export_complete_quarantine_backup, read_quarantine_replacement_transaction_journal,
    resume_quarantine_replacement_transaction, QuarantineReplacementTransactionState,
};

const FAILURE_ENABLE_ENV: &str = "LINGONBERRY_ENABLE_REPLACEMENT_FAILURE_INJECTION";
const FAILURE_POINT_ENV: &str = "LINGONBERRY_REPLACEMENT_FAILURE_POINT";
const JOURNAL_RENAME_FAILURE: &str = "transaction.journal-rename";
const STAGED_LEDGER_WRITE_FAILURE: &str = "staging.ledger-write";
const MATERIALIZED_GENERATION_RENAME_FAILURE: &str =
    "publication.materialized-generation-rename";

static FAILURE_ENV_LOCK: Mutex<()> = Mutex::new(());

struct FailureInjectionGuard;

impl FailureInjectionGuard {
    fn new(point: &str) -> Self {
        std::env::set_var(FAILURE_ENABLE_ENV, "1");
        std::env::set_var(FAILURE_POINT_ENV, point);
        Self
    }
}

impl Drop for FailureInjectionGuard {
    fn drop(&mut self) {
        std::env::remove_var(FAILURE_ENABLE_ENV);
        std::env::remove_var(FAILURE_POINT_ENV);
    }
}

fn serial_test_guard() -> std::sync::MutexGuard<'static, ()> {
    FAILURE_ENV_LOCK
        .lock()
        .unwrap_or_else(|poisoned| poisoned.into_inner())
}

fn temp_dir(label: &str) -> PathBuf {
    std::env::temp_dir().join(format!(
        "lingonberry-{label}-{}",
        SystemTime::now()
            .duration_since(UNIX_EPOCH)
            .unwrap()
            .as_nanos()
    ))
}

fn fixture() -> (PathBuf, PathBuf, PathBuf, PathBuf) {
    let state = temp_dir("early-failure-state");
    let backup = temp_dir("early-failure-backup");
    let proof = temp_dir("early-failure-proof");
    let transaction = temp_dir("early-failure-transaction");
    fs::create_dir_all(&state).unwrap();
    fs::write(state.join("quarantine.jsonl"), b"{\"id\":\"q0\"}\n").unwrap();
    fs::write(
        state.join("quarantine-resolutions.jsonl"),
        b"{\"canonicalId\":\"c1\", \"quarantineId\":\"q1\"}\n",
    )
    .unwrap();
    export_complete_quarantine_backup(&state, &backup).unwrap();
    create_quarantine_replacement_preview(&state, &backup, &proof).unwrap();
    (state, backup, proof, transaction)
}

fn run_failure_and_resume(point: &str, transaction_id: &str) {
    let (state, backup, proof, transaction) = fixture();
    {
        let _failure = FailureInjectionGuard::new(point);
        let error = apply_quarantine_replacement_transaction(
            &state,
            &backup,
            &proof,
            &transaction,
            transaction_id,
        )
        .unwrap_err();
        assert_eq!(error.code, "LB_QUARANTINE_REPLACEMENT_FAILURE_INJECTION");
    }
    assert_eq!(
        read_quarantine_replacement_transaction_journal(&transaction)
            .unwrap()
            .state,
        QuarantineReplacementTransactionState::RecoveryRequired
    );
    let report = resume_quarantine_replacement_transaction(&state, &transaction).unwrap();
    assert_eq!(
        report.state,
        QuarantineReplacementTransactionState::Committed
    );
    assert_eq!(report.active_generation.as_deref(), Some(transaction_id));
    let _ = fs::remove_dir_all(state);
    let _ = fs::remove_dir_all(backup);
    let _ = fs::remove_dir_all(proof);
    let _ = fs::remove_dir_all(transaction);
}

#[test]
fn journal_rename_failure_is_recoverable() {
    let _serial = serial_test_guard();
    run_failure_and_resume(JOURNAL_RENAME_FAILURE, "tx-early-journal-rename");
}

#[test]
fn staged_ledger_write_failure_is_recoverable() {
    let _serial = serial_test_guard();
    run_failure_and_resume(
        STAGED_LEDGER_WRITE_FAILURE,
        "tx-early-staged-ledger-write",
    );
}

#[test]
fn materialized_generation_rename_failure_is_recoverable() {
    let _serial = serial_test_guard();
    run_failure_and_resume(
        MATERIALIZED_GENERATION_RENAME_FAILURE,
        "tx-early-materialized-generation-rename",
    );
}
''')
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src packages/core/tests/quarantine_replacement_early_failure_matrix.rs
          git commit -m "test: cover early replacement durable failures"
          git push origin HEAD:${{ github.head_ref }}
