name: Format operator smoke test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format and commit
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/tests/quarantine_replacement_operator_smoke.rs
          if git diff --cached --quiet; then
            echo 'No Rust formatting changes'
            exit 0
          fi
          git commit -m "style: format replacement operator smoke test"
          git push origin HEAD:${{ github.head_ref }}
