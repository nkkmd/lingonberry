name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check source formatting
        run: cargo fmt --all -- --check
      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings
      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code
      - name: Compile test targets with clippy
        run: cargo clippy --workspace --tests -- -A warnings
      - name: Run workspace tests
        run: cargo test --workspace
  release-version-sync:
    name: Synchronize v0.7.0 versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Update workspace versions and lockfile
        run: |
          find packages -name Cargo.toml -type f -print0 | xargs -0 sed -i 's/^version = "0\.6\.0"$/version = "0.7.0"/'
          cargo check --workspace
      - name: Commit version synchronization
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/Cargo.toml Cargo.lock
          git commit -m "chore: synchronize workspace version 0.7.0"
          git push origin HEAD:${{ github.head_ref }}
  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run JavaScript tests
        run: node --test conformance/manifest-integrity.test.mjs conformance/minimal-producer.test.mjs conformance/transition-evidence-generation.test.mjs conformance/diagnostic-retention-hybrid.test.mjs conformance/diagnostic-cursor-lease.test.mjs conformance/diagnostic-read-guard.test.mjs conformance/diagnostic-read-guard-heartbeat.test.mjs packages/codecs/test/canonicalization.test.mjs packages/identity/test/identity-claim-validator.test.mjs packages/validation/test/validation.test.mjs tests/quarantine-replacement-crash-points.test.mjs
      - name: Run external conformance suite
        run: node conformance/run.mjs
