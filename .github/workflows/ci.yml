name: Diagnose retention library clippy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Capture library Clippy diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --lib -- -D warnings > retention-clippy.txt 2>&1
          status=$?
          cat retention-clippy.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retention-library-clippy
          path: retention-clippy.txt
