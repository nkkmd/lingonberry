name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          cargo fmt --all
          git diff > /tmp/rustfmt.patch
          test ! -s /tmp/rustfmt.patch

      - name: Upload formatting patch
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-patch
          path: /tmp/rustfmt.patch

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
