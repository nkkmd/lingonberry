name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/v0.4.0-cleanup-preview-proof

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add cleanup preview builder tests
        run: |
          cat >> packages/core/src/quarantine_replacement_cleanup_preview_builder.rs <<'RS'

          #[cfg(test)]
          mod tests {
              use super::*;
              use std::time::{SystemTime, UNIX_EPOCH};

              fn temp_dir(label: &str) -> PathBuf {
                  std::env::temp_dir().join(format!(
                      "lingonberry-cleanup-builder-{label}-{}",
                      SystemTime::now()
                          .duration_since(UNIX_EPOCH)
                          .unwrap()
                          .as_nanos()
                  ))
              }

              #[test]
              fn parses_only_supported_active_pointer() {
                  let valid = format!(
                      "{{\"generationDigest\":\"fnv1a64:1111111111111111\",\"transactionId\":\"tx-active\",\"version\":\"{}\"}}",
                      QUARANTINE_CURRENT_GENERATION_POINTER_VERSION
                  );
                  assert_eq!(
                      parse_active_pointer(&valid).unwrap(),
                      (
                          "tx-active".to_string(),
                          "fnv1a64:1111111111111111".to_string()
                      )
                  );
                  assert!(parse_active_pointer("{}").is_err());
                  assert!(parse_active_pointer(&valid.replace("/v1", "/v2")).is_err());
              }

              #[test]
              fn exact_inventory_rejects_missing_unexpected_and_duplicates() {
                  let dir = temp_dir("inventory");
                  fs::create_dir_all(dir.join("nested")).unwrap();
                  fs::write(dir.join("a.txt"), "a").unwrap();
                  fs::write(dir.join("nested/b.txt"), "b").unwrap();

                  assert_eq!(
                      verify_exact_inventory(
                          &dir,
                          &["nested/b.txt".to_string(), "a.txt".to_string()]
                      )
                      .unwrap(),
                      ["a.txt", "nested/b.txt"]
                  );
                  assert!(verify_exact_inventory(&dir, &["a.txt".to_string()]).is_err());
                  assert!(verify_exact_inventory(
                      &dir,
                      &["a.txt".to_string(), "a.txt".to_string()]
                  )
                  .is_err());
                  let _ = fs::remove_dir_all(dir);
              }

              #[cfg(unix)]
              #[test]
              fn exact_inventory_rejects_symlinks() {
                  use std::os::unix::fs::symlink;

                  let dir = temp_dir("symlink");
                  fs::create_dir_all(&dir).unwrap();
                  fs::write(dir.join("target.txt"), "target").unwrap();
                  symlink(dir.join("target.txt"), dir.join("link.txt")).unwrap();
                  assert!(verify_exact_inventory(
                      &dir,
                      &["target.txt".to_string(), "link.txt".to_string()]
                  )
                  .is_err());
                  let _ = fs::remove_dir_all(dir);
              }

              #[test]
              fn digest_reader_rejects_malformed_and_symlinked_sidecars() {
                  let dir = temp_dir("digest");
                  fs::create_dir_all(&dir).unwrap();
                  let digest = dir.join("record.digest");
                  fs::write(&digest, "invalid\n").unwrap();
                  assert!(read_bound_digest(&digest, "record digest").is_err());
                  fs::write(&digest, "fnv1a64:1111111111111111\n").unwrap();
                  assert_eq!(
                      read_bound_digest(&digest, "record digest").unwrap(),
                      "fnv1a64:1111111111111111"
                  );
                  let _ = fs::remove_dir_all(dir);
              }
          }
          RS
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/quarantine_replacement_cleanup_preview_builder.rs
          git commit -m "test: cover cleanup preview state validation"
          git push origin HEAD:feat/v0.4.0-cleanup-preview-proof

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
