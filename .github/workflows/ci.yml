name: Diagnose replacement workspace tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Capture workspace test diagnostics
        shell: bash
        run: |
          set +e
          cargo test --workspace -- --nocapture > workspace-tests.txt 2>&1
          status=$?
          cat workspace-tests.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replacement-workspace-tests
          path: workspace-tests.txt
