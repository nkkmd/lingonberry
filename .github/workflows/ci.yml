name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/v0.4.0-cleanup-transaction

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Connect cleanup transaction journal
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/core/src/lib_entry.rs')
          text = path.read_text()
          text = text.replace(
              'mod quarantine_replacement_cleanup_preview_builder;\n',
              'mod quarantine_replacement_cleanup_preview_builder;\nmod quarantine_replacement_cleanup_transaction;\nmod quarantine_replacement_cleanup_transaction_journal;\n',
          )
          marker = '''pub use quarantine_replacement_cleanup_preview_builder::{
              build_quarantine_replacement_cleanup_preview_from_state,
              verify_quarantine_replacement_cleanup_preview_against_state,
              QuarantineReplacementCleanupSubjectInput,
          };
          '''
          addition = marker + '''pub use quarantine_replacement_cleanup_transaction::{
              quarantine_replacement_cleanup_transaction_journal_json,
              validate_quarantine_replacement_cleanup_transaction_transition,
              QuarantineReplacementCleanupTransactionJournal,
              QuarantineReplacementCleanupTransactionState,
              QUARANTINE_REPLACEMENT_CLEANUP_TRANSACTION_VERSION,
          };
          pub use quarantine_replacement_cleanup_transaction_journal::{
              advance_quarantine_replacement_cleanup_transaction_journal,
              create_quarantine_replacement_cleanup_transaction_journal,
              read_quarantine_replacement_cleanup_transaction_details,
              read_quarantine_replacement_cleanup_transaction_journal,
              record_quarantine_replacement_cleanup_subject_deleted,
              QuarantineReplacementCleanupTransactionReport,
              QUARANTINE_REPLACEMENT_CLEANUP_TRANSACTION_JOURNAL_DIGEST_FILE,
              QUARANTINE_REPLACEMENT_CLEANUP_TRANSACTION_JOURNAL_FILE,
          };
          '''
          if marker not in text:
              raise SystemExit('cleanup preview builder export marker not found')
          path.write_text(text.replace(marker, addition, 1))
          PY
          cat >> packages/core/src/quarantine_replacement_cleanup_transaction.rs <<'RS'

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn rollback_cutoff_is_explicit() {
                  assert!(validate_quarantine_replacement_cleanup_transaction_transition(
                      QuarantineReplacementCleanupTransactionState::RecoveryRequired,
                      QuarantineReplacementCleanupTransactionState::RolledBack,
                  )
                  .is_ok());
                  assert!(validate_quarantine_replacement_cleanup_transaction_transition(
                      QuarantineReplacementCleanupTransactionState::Deleting,
                      QuarantineReplacementCleanupTransactionState::RolledBack,
                  )
                  .is_err());
                  assert!(validate_quarantine_replacement_cleanup_transaction_transition(
                      QuarantineReplacementCleanupTransactionState::RecoveryRequired,
                      QuarantineReplacementCleanupTransactionState::PartiallyDeleted,
                  )
                  .is_ok());
              }
          }
          RS
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/lib_entry.rs packages/core/src/quarantine_replacement_cleanup_transaction.rs packages/core/src/quarantine_replacement_cleanup_transaction_journal.rs
          git commit -m "feat: expose durable cleanup transaction journal"
          git push origin HEAD:feat/v0.4.0-cleanup-transaction

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs
