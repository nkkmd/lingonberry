name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/v0.4.0-cleanup-transaction

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Connect cleanup execution boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/core/src/lib_entry.rs')
          text = path.read_text()
          text = text.replace(
              'mod quarantine_replacement_cleanup_tomb;\n',
              'mod quarantine_replacement_cleanup_tomb;\nmod quarantine_replacement_cleanup_execution;\n',
          )
          marker = '''pub use quarantine_replacement_cleanup_tomb::{
              move_quarantine_replacement_cleanup_to_tomb,
              resume_quarantine_replacement_cleanup_deletion,
              rollback_quarantine_replacement_cleanup_tomb,
              QuarantineReplacementCleanupTombReport,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_DIR,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_DIGEST_FILE,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_FILE,
              QUARANTINE_REPLACEMENT_CLEANUP_TOMB_INVENTORY_VERSION,
          };
          '''
          addition = marker + '''pub use quarantine_replacement_cleanup_execution::{
              commit_verified_quarantine_replacement_cleanup_deletion,
              prepare_verified_quarantine_replacement_cleanup_tomb,
              rollback_verified_quarantine_replacement_cleanup,
              QuarantineReplacementCleanupAuthorization,
          };
          '''
          if marker not in text:
              raise SystemExit('cleanup tomb export marker not found')
          path.write_text(text.replace(marker, addition, 1))
          PY
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/lib_entry.rs packages/core/src/quarantine_replacement_cleanup_execution.rs
          git commit -m "feat: expose double opt-in cleanup execution"
          git push origin HEAD:feat/v0.4.0-cleanup-transaction

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run library clippy
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Run binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code

      - name: Run test clippy
        run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables

      - name: Run workspace tests
        run: cargo test --workspace

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run JavaScript tests
        run: >-
          node --test
          packages/codecs/test/canonicalization.test.mjs
          packages/identity/test/identity-key-v2.test.mjs
          packages/identity/test/identity-claim-validator.test.mjs
          packages/validation/test/validation.test.mjs
          tests/quarantine-replacement-crash-points.test.mjs