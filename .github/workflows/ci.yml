name: Diagnose replacement audit binary clippy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Capture binary Clippy diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --bins -- -D warnings -A dead-code > clippy-bins.txt 2>&1
          status=$?
          cat clippy-bins.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replacement-audit-binary-clippy
          path: clippy-bins.txt
