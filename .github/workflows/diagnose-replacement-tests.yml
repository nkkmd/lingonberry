name: Diagnose replacement tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Capture test output
        shell: bash
        run: |
          set +e
          cargo test -p lingonberry-core --test quarantine_replacement_preview -- --nocapture >replacement-tests.log 2>&1
          echo "$?" >replacement-tests.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: replacement-test-diagnostic
          path: |
            replacement-tests.log
            replacement-tests.status
      - name: Fail when tests failed
        shell: bash
        run: exit "$(cat replacement-tests.status)"
