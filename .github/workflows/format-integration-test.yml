name: Format integration test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-integration-test
          path: packages/core/tests/quarantine_replacement_preview.rs
