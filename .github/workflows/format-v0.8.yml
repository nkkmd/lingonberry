name: Format v0.8 branch
on:
  push:
    branches: [release/v0.8.0-operational-readiness]
permissions:
  contents: write
jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/doctor.rs packages/storage/src/lib.rs packages/storage/src/main.rs
          git commit -m "style(storage): apply rustfmt"
          git push
