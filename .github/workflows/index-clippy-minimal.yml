name: Index Clippy minimal
on: pull_request
permissions:
  contents: read
jobs:
  clippy:
    if: github.head_ref == 'agent/v0.5.0-durable-index-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p lingonberry-indexer --lib -- -D warnings
