name: Index lifecycle Clippy diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.head_ref == 'agent/v0.5.0-durable-index-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables > clippy.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: index-lifecycle-clippy-log
          path: clippy.log
