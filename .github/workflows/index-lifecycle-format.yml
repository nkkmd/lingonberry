name: Index lifecycle formatting

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/v0.5.0-durable-index-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: |
          cargo fmt --all
          rm .github/workflows/index-lifecycle-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style: format index checkpoint test"
          git push
