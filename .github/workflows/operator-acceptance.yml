name: Operator acceptance
on:
  pull_request:
    paths:
      - 'packages/storage/**'
      - 'packages/relay/**'
      - 'deploy/systemd/**'
      - 'docs/operations/SUPPORTED_PLATFORMS.md'
      - 'docs/operations/V0_8_OPERATOR_RUNBOOK.md'
      - 'scripts/v0_8_operator_acceptance.sh'
      - '.github/workflows/operator-acceptance.yml'
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  acceptance:
    name: Ubuntu 24.04 x86_64 acceptance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - name: Apply pending doctor correction
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('packages/storage/src/doctor.rs')
          s=p.read_text()
          old='''fn check_index(config: &StorageRuntimeConfig) -> DoctorCheck {
    let backend = crate::build_storage_backend_at(&config.data_dir);
'''
          if old in s:
              new='''fn check_index(config: &StorageRuntimeConfig) -> DoctorCheck {
    let catalog_path = crate::runtime_storage_layout(config).catalog_path;
    match fs::symlink_metadata(&catalog_path) {
        Ok(metadata) if metadata.file_type().is_symlink() => return failed("index", "LB_DOCTOR_INDEX_SYMLINK_REJECTED", format!("{} is a symbolic link", catalog_path.display())),
        Ok(metadata) if !metadata.is_file() => return failed("index", "LB_DOCTOR_INDEX_NOT_REGULAR_FILE", format!("{} is not a regular index file", catalog_path.display())),
        Ok(_) => {}
        Err(error) if error.kind() == std::io::ErrorKind::NotFound => return warning("index", "LB_DOCTOR_INDEX_MISSING", format!("{} does not exist", catalog_path.display())),
        Err(error) => return failed("index", "LB_DOCTOR_INDEX_METADATA", error.to_string()),
    }
    let backend = crate::build_storage_backend_at(&config.data_dir);
'''
              s=s.replace(old,new,1)
          old_div='''    let available_percent = if capacity_kib == 0 {
        0
    } else {
        available_kib.saturating_mul(100) / capacity_kib
    };
'''
          if old_div in s:
              s=s.replace(old_div,'''    let available_percent = available_kib
        .saturating_mul(100)
        .checked_div(capacity_kib)
        .unwrap_or_default();
''',1)
          p.write_text(s)
          PY
          cargo fmt --all
          if ! git diff --quiet -- packages/storage/src/doctor.rs; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add packages/storage/src/doctor.rs
            git commit -m "fix(storage): preserve doctor read-only index inspection"
            git push
          fi
      - name: Verify reference platform
        run: |
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "x86_64"
          . /etc/os-release
          test "$ID" = "ubuntu"
          test "$VERSION_ID" = "24.04"
          systemctl --version
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Validate Rust workspace
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --lib --bins -- -D warnings -A dead-code
          cargo test --workspace
      - name: Build installed service binaries
        run: |
          cargo build -p lingonberry-storage --bin lingonberry-storage
          cargo build -p lingonberry-relay --bin lingonberry-relay
          sudo install -m 0755 target/debug/lingonberry-storage /usr/local/bin/lingonberry-storage
          sudo install -m 0755 target/debug/lingonberry-relay /usr/local/bin/lingonberry-relay
      - name: Validate systemd units
        run: |
          systemd-analyze verify deploy/systemd/lingonberry-storage-ready.service
          systemd-analyze verify deploy/systemd/lingonberry-relay.service
      - name: Run operator acceptance
        run: bash scripts/v0_8_operator_acceptance.sh