name: Phase 5 ambiguity formatting
on:
  push:
    branches: [agent/v0.5.0-phase5-ambiguous-smoke]
jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-phase5-ambiguous-smoke
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - run: rm .github/workflows/phase5-ambiguous-format.yml
      - run: |
          git config user.name bot
          git config user.email bot@example.com
          git add -A
          git commit -m 'style: format ambiguity smoke'
          git push
