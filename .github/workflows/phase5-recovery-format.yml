name: Phase 5 recovery formatting
on:
  push:
    branches:
      - agent/v0.5.0-phase5-recovery-smoke
permissions:
  contents: write
jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-phase5-recovery-smoke
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - run: rm .github/workflows/phase5-recovery-format.yml
      - run: |
          git config user.name bot
          git config user.email bot@example.com
          git add -A
          git commit -m "style: format recovery smoke"
          git push
