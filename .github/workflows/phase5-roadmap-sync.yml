name: Phase 5 roadmap sync
on:
  push:
    branches:
      - agent/v0.5.0-phase5-recovery-smoke
permissions:
  contents: write
jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v0.5.0-phase5-recovery-smoke
          fetch-depth: 0
      - name: Update roadmap
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/roadmap/RELEASE_0_5_0_ROADMAP.md')
          text = path.read_text()
          replacements = {
              '- [ ] canonical storageからindexをrebuildする正式APIを固定': '- [x] canonical storageからindexをrebuildする正式APIを固定',
              '- [ ] index generationまたはcheckpointを導入': '- [x] index generationまたはcheckpointを導入',
              '- [ ] storageとindexのrecord count／ID set／digestを比較': '- [x] storageとindexのrecord count／ID set／digestを比較',
              '- [ ] partial index updateを検出': '- [x] partial index updateを検出',
              '- [ ] catch-upを実装': '- [x] catch-upを実装',
              '- [ ] consistency verification reportをmachine-readable化': '- [x] consistency verification reportをmachine-readable化',
              '- [ ] corrupt／ambiguous indexをfail closedで扱う': '- [x] corrupt／ambiguous indexをfail closedで扱う',
              '- [ ] process restart': '- [x] process restart',
              '- [ ] restart後のID取得／query': '- [x] restart後のID取得／query',
              '- [ ] index consistency verification': '- [x] index consistency verification',
              '- [ ] partial index updateからのcatch-up': '- [x] partial index updateからのcatch-up',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing roadmap line: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - run: rm .github/workflows/phase5-roadmap-sync.yml
      - run: |
          git config user.name bot
          git config user.email bot@example.com
          git add -A
          git commit -m "docs: sync Phase 4 and recovery smoke roadmap"
          git push
