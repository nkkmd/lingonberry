name: Relay bin Clippy diagnostic
on: pull_request
permissions:
  contents: read
jobs:
  clippy:
    if: github.head_ref == 'agent/v0.5.0-durable-index-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p lingonberry-relay --bin lingonberry-relay -- -D warnings -A dead-code > clippy.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: relay-bin-clippy-log
          path: clippy.log
