name: Rustfmt diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/v0.5.0-lifecycle-foundation

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Capture rustfmt patch
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch
      - name: Capture test clippy output
        run: |
          set +e
          cargo clippy --workspace --tests -- -D warnings -A dead-code -A unused-variables > clippy-tests.log 2>&1
          echo $? > clippy-tests.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: rust-diagnostics
          path: |
            rustfmt.patch
            clippy-tests.log
            clippy-tests.exit
          if-no-files-found: error
