name: Rustfmt diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/v0.5.0-lifecycle-foundation

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Capture publish process test output
        run: |
          set +e
          cargo test -p lingonberry-relay --test publish_process_contract -- --nocapture > publish-process-test.log 2>&1
          echo $? > publish-process-test.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: publish-process-test
          path: |
            publish-process-test.log
            publish-process-test.exit
          if-no-files-found: error
