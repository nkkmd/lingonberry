name: Query rustfmt diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    if: github.head_ref == 'agent/v0.5.0-query-contract'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch
      - uses: actions/upload-artifact@v4
        with:
          name: query-rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
