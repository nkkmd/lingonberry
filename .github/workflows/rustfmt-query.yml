name: Query rustfmt apply

on:
  pull_request:

permissions:
  contents: write

jobs:
  rustfmt:
    if: github.head_ref == 'agent/v0.5.0-query-contract'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply formatting and remove helper workflow
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          cargo fmt --all
          git rm .github/workflows/rustfmt-query.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/core/src/query_contract.rs packages/relay/src/main_v0_5_classified.rs packages/core/tests/basic_query_contract.rs packages/core/src/lib_v0_5.rs
          git commit -m "style: format basic query contract"
          git push origin "HEAD:${TARGET_BRANCH}"
