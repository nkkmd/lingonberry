name: v0.8 configuration integration
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Apply operator configuration integration
        shell: python
        run: |
          from pathlib import Path

          main = Path('packages/storage/src/main.rs')
          text = main.read_text()
          text = text.replace(
              '    build_storage_backend_at, run_storage_doctor, runtime_storage_config, runtime_storage_layout,\n    DoctorCheck, DoctorReport, StorageRuntimeConfig,\n',
              '    build_storage_backend_at, run_storage_doctor, runtime_storage_config_with_overrides,\n    runtime_storage_layout, DoctorCheck, DoctorReport, StorageRuntimeConfig,\n    StorageRuntimeConfigOverrides, STORAGE_CONFIG_PRECEDENCE,\n'
          )
          start = text.index('fn run(args: Vec<String>) -> Result<(), String> {')
          end = text.index('\nfn handle_doctor', start)
          replacement = r'''fn run(args: Vec<String>) -> Result<(), String> {
              let invocation = parse_invocation(args)?;
              let config = runtime_storage_config_with_overrides(&invocation.overrides)?;
              let backend = build_storage_backend_at(&config.data_dir);

              match invocation.command.as_str() {
                  "capabilities" => {
                      println!(
                          "{}",
                          to_canonical_json(&json_object(vec![
                              ("status", JsonValue::String("ok".to_string())),
                              ("service", JsonValue::String("storage".to_string())),
                              (
                                  "operations",
                                  JsonValue::Array(vec![
                                      JsonValue::String("append".to_string()),
                                      JsonValue::String("retrieve".to_string()),
                                      JsonValue::String("replay".to_string()),
                                      JsonValue::String("list".to_string()),
                                      JsonValue::String("config".to_string()),
                                      JsonValue::String("status".to_string()),
                                      JsonValue::String("doctor".to_string()),
                                      JsonValue::String("verify".to_string()),
                                      JsonValue::String("ready".to_string()),
                                      JsonValue::String("run".to_string()),
                                  ]),
                              ),
                              ("multiNode", build_multi_node_policy_manifest()),
                          ]))
                      );
                      Ok(())
                  }
                  "config" => {
                      print_config(&config);
                      Ok(())
                  }
                  "status" => {
                      print_operator_status(&config);
                      Ok(())
                  }
                  "doctor" => handle_doctor(&config, false),
                  "verify" => handle_doctor(&config, true),
                  "ready" | "run" => {
                      print_runtime_status(&config);
                      Ok(())
                  }
                  "append" => {
                      let pathname = invocation.command_args.first().ok_or_else(|| {
                          "usage: lingonberry-storage [options] append <json-file>".to_string()
                      })?;
                      handle_append(pathname, &backend)
                  }
                  "retrieve" => {
                      let canonical_id = invocation.command_args.first().ok_or_else(|| {
                          "usage: lingonberry-storage [options] retrieve <canonical-id>".to_string()
                      })?;
                      handle_retrieve(canonical_id, &backend)
                  }
                  "replay" => handle_replay(&backend),
                  "list" => handle_list(&backend),
                  command => Err(format!("unknown command: {command}")),
              }
          }

          #[derive(Debug, PartialEq, Eq)]
          struct ParsedInvocation {
              command: String,
              command_args: Vec<String>,
              overrides: StorageRuntimeConfigOverrides,
          }

          fn parse_invocation(args: Vec<String>) -> Result<ParsedInvocation, String> {
              let mut overrides = StorageRuntimeConfigOverrides::default();
              let mut index = 0;
              while let Some(argument) = args.get(index) {
                  if argument == "--" {
                      index += 1;
                      break;
                  }
                  if !argument.starts_with("--") {
                      break;
                  }
                  let target = match argument.as_str() {
                      "--config" => &mut overrides.config_path,
                      "--state-dir" => &mut overrides.state_dir,
                      "--data-dir" => &mut overrides.data_dir,
                      "--backup-dir" => &mut overrides.backup_dir,
                      "--temp-dir" => &mut overrides.temp_dir,
                      _ => return Err(format!("usage: unknown global option: {argument}")),
                  };
                  let value = args.get(index + 1).ok_or_else(|| {
                      format!("usage: global option {argument} requires a value")
                  })?;
                  if value.is_empty() || value.starts_with("--") {
                      return Err(format!("usage: global option {argument} requires a value"));
                  }
                  *target = Some(value.into());
                  index += 2;
              }
              let command = args.get(index).cloned().ok_or_else(|| {
                  "usage: lingonberry-storage [--config PATH] [--state-dir PATH] [--data-dir PATH] [--backup-dir PATH] [--temp-dir PATH] <command>".to_string()
              })?;
              Ok(ParsedInvocation {
                  command,
                  command_args: args[index + 1..].to_vec(),
                  overrides,
              })
          }
          '''
          text = text[:start] + replacement + text[end:]
          marker = '        to_canonical_json(&json_object(vec![\n            ("configPath", path_value(config.config_path.as_ref())),\n'
          replacement = '        to_canonical_json(&json_object(vec![\n            ("containsSecrets", JsonValue::Bool(false)),\n            (\n                "precedence",\n                JsonValue::Array(\n                    STORAGE_CONFIG_PRECEDENCE\n                        .iter()\n                        .map(|value| JsonValue::String((*value).to_string()))\n                        .collect(),\n                ),\n            ),\n            ("configPath", path_value(config.config_path.as_ref())),\n'
          if marker not in text:
              raise SystemExit('print_config marker not found')
          text = text.replace(marker, replacement, 1)
          text += r'''

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn global_options_are_parsed_before_the_command() {
                  let parsed = parse_invocation(vec![
                      "--state-dir".to_string(),
                      "/state".to_string(),
                      "--data-dir".to_string(),
                      "/data".to_string(),
                      "doctor".to_string(),
                  ])
                  .expect("parse invocation");
                  assert_eq!(parsed.command, "doctor");
                  assert_eq!(parsed.overrides.state_dir, Some("/state".into()));
                  assert_eq!(parsed.overrides.data_dir, Some("/data".into()));
              }

              #[test]
              fn unknown_global_option_is_rejected() {
                  let error = parse_invocation(vec![
                      "--repair".to_string(),
                      "now".to_string(),
                      "doctor".to_string(),
                  ])
                  .expect_err("unknown option must fail");
                  assert!(error.contains("unknown global option"));
              }
          }
          '''
          main.write_text(text)

          doctor = Path('packages/storage/src/doctor.rs')
          text = doctor.read_text()
          old = '''    let mut checks = Vec::new();

              checks.push(check_config(config));
              checks.push(check_directory("state_directory", &config.state_dir));
              checks.push(check_directory("data_directory", &config.data_dir));
              checks.push(check_directory("backup_directory", &config.backup_dir));
              checks.push(check_directory("temporary_directory", &config.temp_dir));
              checks.push(check_storage_format(config));
              checks.push(check_migration_journal(config));
              checks.push(check_regular_file("raw_log", &layout.raw_log_path));
              checks.push(check_regular_file("catalog", &layout.catalog_path));
              checks.push(DoctorCheck {
                  name: "disk_capacity",
                  severity: DoctorSeverity::Warning,
                  code: "LB_DOCTOR_DISK_CAPACITY_UNAVAILABLE",
                  message: "portable disk-capacity inspection is not available in this build".to_string(),
              });'''.replace('              ', '    ')
          new = '''    let checks = vec![
              check_config(config),
              check_directory("state_directory", &config.state_dir),
              check_directory("data_directory", &config.data_dir),
              check_directory("backup_directory", &config.backup_dir),
              check_directory("temporary_directory", &config.temp_dir),
              check_storage_format(config),
              check_migration_journal(config),
              check_regular_file("raw_log", &layout.raw_log_path),
              check_regular_file("catalog", &layout.catalog_path),
              DoctorCheck {
                  name: "disk_capacity",
                  severity: DoctorSeverity::Warning,
                  code: "LB_DOCTOR_DISK_CAPACITY_UNAVAILABLE",
                  message: "portable disk-capacity inspection is not available in this build".to_string(),
              },
          ];'''.replace('          ', '    ')
          if old not in text:
              raise SystemExit('doctor marker not found')
          doctor.write_text(text.replace(old, new, 1))
      - run: cargo fmt --all
      - run: cargo clippy --workspace --lib --bins -- -D warnings -A dead-code
      - run: cargo test --workspace
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/lib.rs packages/storage/src/main.rs packages/storage/src/doctor.rs
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat(storage): integrate effective configuration"
          git push
