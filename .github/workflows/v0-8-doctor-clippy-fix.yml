name: v0.8 doctor clippy fix
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Clean duplicate block and capture validation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('packages/storage/src/doctor.rs')
          s=p.read_text()
          for line in ['use lingonberry_core::resolve_quarantine_active_generation;\n','use lingonberry_indexer::{verify_index, IndexConsistencyStatus, IndexSnapshot};\n','use std::process::Command;\n']:
              while s.count(line)>1:
                  first=s.find(line); second=s.find(line,first+len(line)); s=s[:second]+s[second+len(line):]
          marker='fn check_generation_pointer(config: &StorageRuntimeConfig) -> DoctorCheck {'
          first=s.find(marker); second=s.find(marker,first+len(marker)); aggregate=s.find('fn aggregate_severity(checks: &[DoctorCheck]) -> DoctorSeverity {')
          if second>=0: s=s[:second]+s[aggregate:]
          s=s.replace('text.lines().last()','text.lines().next_back()')
          p.write_text(s)
          PY
          cargo fmt --all
          set +e
          cargo clippy -q --workspace --lib --bins -- -D warnings -A dead-code > doctor-clippy.log 2>&1
          echo "clippy_status=$?" >> doctor-clippy.log
          cargo test -q --workspace > doctor-test.log 2>&1
          echo "test_status=$?" >> doctor-test.log
          set -e
      - name: Commit diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/doctor.rs doctor-clippy.log doctor-test.log
          git commit -m "test(storage): isolate expanded doctor validation"
          git push