name: v0.8 doctor expand
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Expand and diagnose doctor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('packages/storage/src/doctor.rs')
          s=p.read_text()
          s=s.replace('use std::fs;\nuse std::path::Path;\n', 'use lingonberry_core::resolve_quarantine_active_generation;\nuse lingonberry_indexer::{verify_index, IndexConsistencyStatus, IndexSnapshot};\nuse std::fs;\nuse std::path::Path;\nuse std::process::Command;\n')
          old='''        check_regular_file("raw_log", &layout.raw_log_path),
                  check_regular_file("catalog", &layout.catalog_path),
                  DoctorCheck {
                      name: "disk_capacity",
                      severity: DoctorSeverity::Warning,
                      code: "LB_DOCTOR_DISK_CAPACITY_UNAVAILABLE",
                      message: "portable disk-capacity inspection is not available in this build".to_string(),
                  },
          '''
          new='''        check_regular_file("raw_log", &layout.raw_log_path),
                  check_regular_file("catalog", &layout.catalog_path),
                  check_generation_pointer(config),
                  check_index(config),
                  check_backup_inventory(config),
                  check_operational_workspace(config),
                  check_disk_capacity(config),
          '''
          s=s.replace(old,new)
          marker='fn aggregate_severity(checks: &[DoctorCheck]) -> DoctorSeverity {'
          funcs=Path('.github/workflows/doctor-functions.tmp').read_text() if Path('.github/workflows/doctor-functions.tmp').exists() else ''
          if not funcs:
              raise SystemExit('doctor-functions.tmp missing')
          s=s.replace(marker,funcs+'\n'+marker)
          p.write_text(s)
          PY
          cargo fmt --all
          set +e
          cargo check -p lingonberry-storage --all-targets > doctor-compile.log 2>&1
          status=$?
          set -e
          echo "exit_status=$status" >> doctor-compile.log
      - name: Commit diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/doctor.rs doctor-compile.log
          git commit -m "test(storage): capture expanded doctor diagnostics"
          git push