name: v0.8 observability integration
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Apply health readiness and metrics
        shell: python
        run: |
          from pathlib import Path
          path = Path('packages/storage/src/main.rs')
          text = path.read_text()
          text = text.replace(
              '                            JsonValue::String("verify".to_string()),\n                            JsonValue::String("ready".to_string()),\n',
              '                            JsonValue::String("verify".to_string()),\n                            JsonValue::String("health".to_string()),\n                            JsonValue::String("ready".to_string()),\n                            JsonValue::String("metrics".to_string()),\n',
              1,
          )
          old = '''        "doctor" => handle_doctor(&config, false),
                  "verify" => handle_doctor(&config, true),
                  "ready" | "run" => {
                      print_runtime_status(&config);
                      Ok(())
                  }'''.replace('                  ', '        ')
          new = '''        "doctor" => handle_doctor(&config, false),
                  "verify" => handle_doctor(&config, true),
                  "health" => {
                      print_health();
                      Ok(())
                  }
                  "ready" => handle_readiness(&config),
                  "metrics" => {
                      print_metrics(&config);
                      Ok(())
                  }
                  "run" => {
                      print_runtime_status(&config);
                      Ok(())
                  }'''.replace('                  ', '        ')
          if old not in text:
              raise SystemExit('command dispatch marker not found')
          text = text.replace(old, new, 1)
          marker = '\nfn handle_doctor(config: &StorageRuntimeConfig, strict: bool) -> Result<(), String> {'
          addition = r'''
          fn print_health() {
              println!(
                  "{}",
                  to_canonical_json(&json_object(vec![
                      ("service", JsonValue::String("storage".to_string())),
                      ("status", JsonValue::String("ok".to_string())),
                      ("scope", JsonValue::String("process".to_string())),
                  ]))
              );
          }

          fn handle_readiness(config: &StorageRuntimeConfig) -> Result<(), String> {
              let report = run_storage_doctor(config);
              let ready = !report.has_failures();
              let status = if ready { "ready" } else { "not_ready" };
              println!(
                  "{}",
                  to_canonical_json(&json_object(vec![
                      ("service", JsonValue::String("storage".to_string())),
                      ("status", JsonValue::String(status.to_string())),
                      ("ready", JsonValue::Bool(ready)),
                      (
                          "diagnosticStatus",
                          JsonValue::String(report.severity.as_str().to_string()),
                      ),
                  ]))
              );
              if ready {
                  Ok(())
              } else {
                  Err("readiness detected failed checks".to_string())
              }
          }

          fn print_metrics(config: &StorageRuntimeConfig) {
              let report = run_storage_doctor(config);
              let ok = report
                  .checks
                  .iter()
                  .filter(|check| check.severity.as_str() == "ok")
                  .count();
              let warning = report
                  .checks
                  .iter()
                  .filter(|check| check.severity.as_str() == "warning")
                  .count();
              let failed = report
                  .checks
                  .iter()
                  .filter(|check| check.severity.as_str() == "failed")
                  .count();
              println!(
                  "{}",
                  to_canonical_json(&json_object(vec![
                      ("service", JsonValue::String("storage".to_string())),
                      ("metricsVersion", JsonValue::String("1".to_string())),
                      ("boundedCardinality", JsonValue::Bool(true)),
                      ("ready", JsonValue::Number((!report.has_failures() as usize).to_string())),
                      ("doctorChecksOk", JsonValue::Number(ok.to_string())),
                      ("doctorChecksWarning", JsonValue::Number(warning.to_string())),
                      ("doctorChecksFailed", JsonValue::Number(failed.to_string())),
                  ]))
              );
          }
          '''.replace('          ', '')
          if marker not in text:
              raise SystemExit('doctor function marker not found')
          text = text.replace(marker, '\n' + addition + marker, 1)
          text = text.replace(
              '} else if error.contains("doctor detected") || error.contains("verify detected") {',
              '} else if error.contains("doctor detected")\n        || error.contains("verify detected")\n        || error.contains("readiness detected")\n    {',
              1,
          )
          path.write_text(text)
      - run: cargo fmt --all
      - run: cargo clippy --workspace --lib --bins -- -D warnings -A dead-code
      - run: cargo test --workspace
      - name: Commit observability integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/main.rs
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat(storage): add health readiness and metrics"
          git push
