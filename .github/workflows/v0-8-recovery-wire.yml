name: v0.8 recovery wiring
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  wire:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Wire recovery module into operator CLI
        shell: python
        run: |
          from pathlib import Path
          lib = Path('packages/storage/src/lib.rs')
          text = lib.read_text()
          if 'pub mod recovery;' not in text:
              text = text.replace('mod migration_runtime;\n', 'mod migration_runtime;\npub mod recovery;\n', 1)
          lib.write_text(text)

          main = Path('packages/storage/src/main.rs')
          text = main.read_text()
          if 'JsonValue::String("backup".to_string())' not in text:
              text = text.replace(
                  '                            JsonValue::String("metrics".to_string()),\n                            JsonValue::String("run".to_string()),',
                  '                            JsonValue::String("metrics".to_string()),\n                            JsonValue::String("backup".to_string()),\n                            JsonValue::String("restore".to_string()),\n                            JsonValue::String("index".to_string()),\n                            JsonValue::String("drill".to_string()),\n                            JsonValue::String("run".to_string()),',
                  1,
              )
          if '"backup" => lingonberry_storage::recovery::handle_backup' not in text:
              text = text.replace(
                  '        "metrics" => {\n            print_metrics(&config);\n            Ok(())\n        }\n        "run" => {',
                  '        "metrics" => {\n            print_metrics(&config);\n            Ok(())\n        }\n        "backup" => lingonberry_storage::recovery::handle_backup(\n            &config,\n            &backend,\n            &invocation.command_args,\n        ),\n        "restore" => lingonberry_storage::recovery::handle_restore(\n            &config,\n            &invocation.command_args,\n        ),\n        "index" => lingonberry_storage::recovery::handle_index(\n            &backend,\n            &invocation.command_args,\n        ),\n        "drill" => lingonberry_storage::recovery::handle_drill(\n            &config,\n            &invocation.command_args,\n        ),\n        "run" => {',
                  1,
              )
          main.write_text(text)
      - run: cargo fmt --all
      - run: cargo clippy --workspace --lib --bins -- -D warnings -A dead-code
      - run: cargo test --workspace
      - name: Smoke test recovery commands
        run: |
          set -eux
          root="$(mktemp -d)"
          run_operator() { cargo run -q -p lingonberry-storage --bin lingonberry-storage -- "$@"; }
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" backup create "$root/archive"
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" backup verify "$root/archive"
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" restore plan "$root/archive" "$root/restored"
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" restore apply "$root/archive" "$root/restored"
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" index verify
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" index rebuild
          run_operator --state-dir "$root/state" --data-dir "$root/data" --backup-dir "$root/backups" --temp-dir "$root/tmp" drill restore "$root/archive"
      - name: Commit recovery wiring
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/lib.rs packages/storage/src/main.rs Cargo.lock
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat(storage): wire operator recovery commands"
          git push
