name: v0.8 rustfmt apply
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  format:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatted Rust sources
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock packages
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style: format v0.8 Rust sources"
          git push
