name: v0.2.0 smoke validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - release/v0.2.0-smoke-validation

permissions:
  contents: read

env:
  LINGONBERRY_STATE_DIR: /tmp/lingonberry-v020-state
  LINGONBERRY_ARCHIVE_DIR: /tmp/lingonberry-v020-archive

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out main release commit
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build release binaries
        run: cargo build --workspace --bins

      - name: Initialize isolated runtime
        run: |
          rm -rf "$LINGONBERRY_STATE_DIR" "$LINGONBERRY_ARCHIVE_DIR"
          mkdir -p "$LINGONBERRY_STATE_DIR"

      - name: Capabilities smoke
        run: |
          set -euo pipefail
          cargo run -q -p lingonberry-relay -- capabilities | tee /tmp/capabilities.json
          test -s /tmp/capabilities.json
          grep -q '^{' /tmp/capabilities.json

      - name: Validation smoke
        run: cargo run -q -p lingonberry-relay -- validate fixtures/http-publish-request/minimal-request.json

      - name: Publish smoke
        run: |
          set -euo pipefail
          cargo run -q -p lingonberry-relay -- publish fixtures/http-publish-request/minimal-request.json \
            | tee /tmp/publish.json
          grep -q 'canonicalId' /tmp/publish.json

      - name: Archive export smoke
        run: |
          cargo run -q -p lingonberry-relay -- export-archive "$LINGONBERRY_ARCHIVE_DIR"
          test -d "$LINGONBERRY_ARCHIVE_DIR"

      - name: Archive import smoke
        run: cargo run -q -p lingonberry-relay -- import-archive "$LINGONBERRY_ARCHIVE_DIR"

      - name: Quarantine lifecycle smoke
        run: |
          set -euo pipefail
          cargo test -q -p lingonberry-core quarantine_annotations::tests
          cargo test -q -p lingonberry-core quarantine_dismissals::tests
          cargo test -q -p lingonberry-core quarantine_permanent_rejections::tests
          cargo test -q -p lingonberry-core quarantine_concurrency::tests
          cargo test -q -p lingonberry-relay role_permissions_are_enforced_at_http_boundary
          cargo test -q -p lingonberry-relay admin_http_access_distinguishes_401_and_403

      - name: Ledger rotation, backup, restore, and compaction smoke
        run: |
          set -euo pipefail
          cargo test -q -p lingonberry-core quarantine_ledger_index::tests
          cargo test -q -p lingonberry-core quarantine_segments::tests
          cargo test -q -p lingonberry-core quarantine_complete_backup::tests
          cargo test -q -p lingonberry-core quarantine_compaction::tests

      - name: Explicit role-token diagnostic smoke
        shell: bash
        env:
          LINGONBERRY_ADMIN_OBSERVER_TOKEN: observer-v020-secret
          LINGONBERRY_ADMIN_REVIEWER_TOKEN: reviewer-v020-secret
          LINGONBERRY_ADMIN_OPERATOR_TOKEN: operator-v020-secret
        run: |
          set -euo pipefail
          cargo run -q -p lingonberry-relay --bin lingonberry-admin-auth-config \
            | tee /tmp/admin-auth-explicit.json
          grep -q '"legacyOperatorFallbackActive":false' /tmp/admin-auth-explicit.json
          grep -q '"operatorConfiguredExplicitly":true' /tmp/admin-auth-explicit.json
          grep -q '"secretsIncluded":false' /tmp/admin-auth-explicit.json
          ! grep -q 'observer-v020-secret' /tmp/admin-auth-explicit.json
          ! grep -q 'reviewer-v020-secret' /tmp/admin-auth-explicit.json
          ! grep -q 'operator-v020-secret' /tmp/admin-auth-explicit.json

      - name: Legacy token deprecation diagnostic smoke
        shell: bash
        env:
          LINGONBERRY_ADMIN_TOKEN: legacy-v020-secret
        run: |
          set -euo pipefail
          cargo run -q -p lingonberry-relay --bin lingonberry-admin-auth-config \
            | tee /tmp/admin-auth-legacy.json
          grep -q '"legacyOperatorFallbackActive":true' /tmp/admin-auth-legacy.json
          grep -q 'LB_ADMIN_LEGACY_TOKEN_DEPRECATED' /tmp/admin-auth-legacy.json
          grep -q '"actionRequired":true' /tmp/admin-auth-legacy.json
          grep -q '"secretsIncluded":false' /tmp/admin-auth-legacy.json
          ! grep -q 'legacy-v020-secret' /tmp/admin-auth-legacy.json

      - name: Release-version consistency smoke
        shell: bash
        run: |
          set -euo pipefail
          test "$(grep -R '^version = "0.2.0"$' packages/*/Cargo.toml | wc -l)" -eq 7
          test "$(grep -c '^version = "0.2.0"$' Cargo.lock)" -eq 7
          grep -q '## \[0.2.0\]' CHANGELOG.md
          test -f docs/roadmap/RELEASE_0_2_0_RELEASE_NOTE.md
          test -f docs/roadmap/RELEASE_0_2_0_CHECKLIST.md
