name: v0.8 Clippy diagnostic
on:
  pull_request:
    paths:
      - 'packages/storage/**'
      - '.github/workflows/v0_8_clippy_diagnostic.yml'
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture library Clippy output
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --lib -- -D warnings > clippy.log 2>&1
          status=$?
          cat clippy.log
          echo "$status" > clippy-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: v0-8-clippy-diagnostic
          path: |
            clippy.log
            clippy-status.txt
