name: v0.8 Clippy fix
on:
  push:
    branches: [release/v0.8.0-operational-readiness]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Apply Clippy fixes
        run: cargo clippy --workspace --lib --fix --allow-dirty --allow-staged -- -D warnings
      - run: cargo fmt --all
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/storage/src/doctor.rs
          git commit -m "fix(storage): satisfy clippy"
          git push
