name: v0.8.0 version synchronization
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  sync:
    if: github.head_ref == 'release/v0.8.0-operational-readiness'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.8.0-operational-readiness
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Synchronize package versions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in Path('packages').glob('*/Cargo.toml'):
              text = path.read_text()
              text = text.replace('version = "0.7.0"', 'version = "0.8.0"')
              path.write_text(text)
          PY
          cargo check --workspace
          cargo fmt --all -- --check
          cargo clippy --workspace --lib --bins -- -D warnings -A dead-code
          cargo test --workspace
      - name: Commit synchronized versions
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/*/Cargo.toml Cargo.lock
          git commit -m "chore: set workspace packages to 0.8.0"
          git push
