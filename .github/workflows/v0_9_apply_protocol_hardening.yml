name: Apply v0.9 protocol hardening

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'release/v0.9.0-release-candidate-hardening'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.9.0-release-candidate-hardening
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact-match hardening patch
        run: python3 scripts/apply_v0_9_protocol_hardening.py
      - name: Format
        id: format
        continue-on-error: true
        run: cargo fmt --all -- --check > /tmp/format.log 2>&1
      - name: Clippy
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings > /tmp/clippy.log 2>&1
      - name: Tests
        id: tests
        continue-on-error: true
        run: cargo test --workspace > /tmp/tests.log 2>&1
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-hardening-validation
          path: /tmp/*.log
      - name: Require validation success
        run: |
          test '${{ steps.format.outcome }}' = success
          test '${{ steps.clippy.outcome }}' = success
          test '${{ steps.tests.outcome }}' = success
      - name: Commit validated hardening
        shell: bash
        run: |
          rm .github/workflows/v0_9_apply_protocol_hardening.yml
          rm scripts/apply_v0_9_protocol_hardening.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/protocol/src/lib.rs packages/protocol/tests/parser_limits.rs .github/workflows/v0_9_apply_protocol_hardening.yml scripts/apply_v0_9_protocol_hardening.py
          git commit -m "fix: harden protocol parsing and signature workspaces"
          git push origin HEAD:release/v0.9.0-release-candidate-hardening
