name: Apply v0.9 signature workspace tests

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'release/v0.9.0-release-candidate-hardening'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.9.0-release-candidate-hardening
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply signature workspace tests
        run: python3 scripts/apply_v0_9_signature_workspace_tests.py
      - name: Format
        run: cargo fmt --all
      - name: Library clippy
        run: cargo clippy --workspace --lib -- -D warnings
      - name: Binary clippy
        run: cargo clippy --workspace --bins -- -D warnings -A dead-code
      - name: Test target clippy
        run: cargo clippy --workspace --tests -- -A warnings
      - name: Tests
        run: cargo test --workspace
      - name: Commit validated regression tests
        run: |
          rm .github/workflows/v0_9_apply_signature_tests.yml
          rm scripts/apply_v0_9_signature_workspace_tests.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/protocol/src/lib.rs .github/workflows/v0_9_apply_signature_tests.yml scripts/apply_v0_9_signature_workspace_tests.py
          git commit -m "test: cover signature workspace security contracts"
          git push origin HEAD:release/v0.9.0-release-candidate-hardening
