[package]
name = "lingonberry-relay"
version = "0.5.0"
edition = "2021"
license = "Apache-2.0"
autobins = false

[lib]
name = "lingonberry_relay"
path = "src/lib.rs"

[[bin]]
name = "lingonberry-relay"
path = "src/main_v0_5_index.rs"

[[bin]]
name = "lingonberry-admin-auth-config"
path = "src/admin_auth_config_main.rs"

[[bin]]
name = "lingonberry-quarantine-backup"
path = "src/quarantine_backup_main.rs"

[[bin]]
name = "lingonberry-quarantine-maintenance"
path = "src/quarantine_maintenance_main.rs"

[dependencies]
lingonberry-core = { path = "../core" }
lingonberry-indexer = { path = "../indexer" }
lingonberry-protocol = { path = "../protocol" }
lingonberry-validation = { path = "../validation" }
